<svg width="900" height="600" xmlns="http://www.w3.org/2000/svg">
  <style>
    .box { rx:15; ry:15; }
    .text { font-family: Arial, sans-serif; fill: #222; font-size: 16px; text-anchor: middle; }
    .title { font-size: 18px; font-weight: bold; }
    .arrow { stroke: #444; stroke-width: 2; marker-end: url(#arrowhead); }
  </style>

  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" 
    refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#444"/>
    </marker>
  </defs>

  <!-- Estratégicos -->
  <rect x="250" y="40" width="400" height="80" fill="#4A90E2" class="box"/>
  <text x="450" y="70" class="text title" fill="white">ESTRATÉGICOS</text>
  <text x="450" y="95" class="text" fill="white">Planeación • Dirección • Estrategia</text>

  <!-- Arrow -->
  <line x1="450" y1="120" x2="450" y2="160" class="arrow"/>

  <!-- Misionales -->
  <rect x="200" y="160" width="500" height="120" fill="#4CAF50" class="box"/>
  <text x="450" y="190" class="text title" fill="white">MISIONALES</text>
  <text x="450" y="220" class="text" fill="white">Entrada → Proceso → Salida</text>
  <text x="450" y="250" class="text" fill="white">Generan valor al cliente</text>

  <!-- Arrow -->
  <line x1="450" y1="280" x2="450" y2="320" class="arrow"/>

  <!-- Apoyo -->
  <rect x="200" y="320" width="500" height="100" fill="#F5A623" class="box"/>
  <text x="450" y="350" class="text title" fill="white">APOYO</text>
  <text x="450" y="380" class="text" fill="white">RRHH • Contabilidad • Sistemas</text>

  <!-- Cliente -->
  <line x1="450" y1="420" x2="450" y2="470" class="arrow"/>
  <text x="450" y="510" class="text title">CLIENTE</text>

</svg>
