<svg width="900" height="600" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">

  <!-- Fondo -->
  <rect width="100%" height="100%" fill="#0f172a"/>

  <!-- Título -->
  <text x="450" y="60" text-anchor="middle" font-size="32" fill="#38bdf8" font-weight="bold">
    SRC / SRS
  </text>
  <text x="450" y="90" text-anchor="middle" font-size="16" fill="#cbd5f5">
    Especificación de Requisitos de Software
  </text>

  <!-- Caja definición -->
  <rect x="50" y="130" width="800" height="80" rx="10" fill="#1e293b"/>
  <text x="450" y="165" text-anchor="middle" font-size="18" fill="#e2e8f0">
    Documento que define QUÉ debe hacer un sistema de software
  </text>

  <!-- Sección funcional -->
  <rect x="80" y="250" width="320" height="200" rx="10" fill="#1e40af"/>
  <text x="240" y="280" text-anchor="middle" font-size="18" fill="white" font-weight="bold">
    Requisitos Funcionales
  </text>
  <text x="240" y="310" text-anchor="middle" font-size="14" fill="#e0f2fe">
    Qué hace el sistema
  </text>

  <text x="240" y="340" text-anchor="middle" font-size="13" fill="white">
    • Login de usuarios
  </text>
  <text x="240" y="365" text-anchor="middle" font-size="13" fill="white">
    • Registro
  </text>
  <text x="240" y="390" text-anchor="middle" font-size="13" fill="white">
    • Generar reportes
  </text>

  <!-- Sección no funcional -->
  <rect x="500" y="250" width="320" height="200" rx="10" fill="#047857"/>
  <text x="660" y="280" text-anchor="middle" font-size="18" fill="white" font-weight="bold">
    Requisitos No Funcionales
  </text>
  <text x="660" y="310" text-anchor="middle" font-size="14" fill="#d1fae5">
    Cómo se comporta
  </text>

  <text x="660" y="340" text-anchor="middle" font-size="13" fill="white">
    • Tiempo de respuesta
  </text>
  <text x="660" y="365" text-anchor="middle" font-size="13" fill="white">
    • Seguridad
  </text>
  <text x="660" y="390" text-anchor="middle" font-size="13" fill="white">
    • Usabilidad
  </text>

  <!-- Flecha -->
  <line x1="400" y1="350" x2="500" y2="350" stroke="#38bdf8" stroke-width="3"/>
  <polygon points="500,350 490,345 490,355" fill="#38bdf8"/>

  <!-- Footer -->
  <text x="450" y="550" text-anchor="middle" font-size="12" fill="#94a3b8">
    SRC / SRS - Base del desarrollo de software
  </text>

</svg>
