<svg width="1400" height="700" xmlns="http://www.w3.org/2000/svg">

  <!-- Estilos -->
  <style>
    .title { font: bold 20px sans-serif; fill: white; }
    .text { font: 14px sans-serif; fill: black; }
    .box { fill: #E3F2FD; stroke: #1E88E5; stroke-width: 2; rx: 10; }
    .decision { fill: #FFF3E0; stroke: #FB8C00; stroke-width: 2; }
    .process { fill: #E8F5E9; stroke: #43A047; stroke-width: 2; }
    .arrow { stroke: black; stroke-width: 2; marker-end: url(#arrowhead); }
  </style>

  <!-- Flechas -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7"
    refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" />
    </marker>
  </defs>

  <!-- Título -->
  <rect x="450" y="20" width="500" height="50" fill="#2E7D32"/>
  <text x="700" y="50" text-anchor="middle" class="title">
    Proceso de Recolección de Información
  </text>

  <!-- Inicio -->
  <rect x="600" y="100" width="200" height="50" class="box"/>
  <text x="700" y="130" text-anchor="middle" class="text">
    Definir problema de investigación
  </text>

  <!-- Decisión -->
  <polygon points="650,180 750,180 800,220 750,260 650,260 600,220"
  class="decision"/>
  <text x="700" y="225" text-anchor="middle" class="text">
    ¿Qué tipo de datos necesitas?
  </text>

  <!-- Opciones -->
  <rect x="350" y="300" width="220" height="60" class="process"/>
  <text x="460" y="325" text-anchor="middle" class="text">
    Datos cuantitativos
  </text>
  <text x="460" y="345" text-anchor="middle" class="text">
    → Encuestas
  </text>

  <rect x="800" y="300" width="250" height="80" class="process"/>
  <text x="925" y="325" text-anchor="middle" class="text">
    Datos cualitativos
  </text>
  <text x="925" y="345" text-anchor="middle" class="text">
    → Entrevistas / Observación
  </text>
  <text x="925" y="365" text-anchor="middle" class="text">
    → Grupos focales / Documentos
  </text>

  <!-- Selección -->
  <rect x="550" y="420" width="300" height="60" class="box"/>
  <text x="700" y="450" text-anchor="middle" class="text">
    Seleccionar instrumento adecuado
  </text>

  <!-- Aplicación -->
  <rect x="550" y="520" width="300" height="60" class="process"/>
  <text x="700" y="550" text-anchor="middle" class="text">
    Aplicar instrumento
  </text>

  <!-- Resultados -->
  <rect x="550" y="620" width="300" height="60" class="box"/>
  <text x="700" y="650" text-anchor="middle" class="text">
    Analizar datos y obtener conclusiones
  </text>

  <!-- Flechas -->
  <line x1="700" y1="150" x2="700" y2="180" class="arrow"/>
  <line x1="650" y1="240" x2="460" y2="300" class="arrow"/>
  <line x1="750" y1="240" x2="925" y2="300" class="arrow"/>
  <line x1="460" y1="360" x2="700" y2="420" class="arrow"/>
  <line x1="925" y1="380" x2="700" y2="420" class="arrow"/>
  <line x1="700" y1="480" x2="700" y2="520" class="arrow"/>
  <line x1="700" y1="580" x2="700" y2="620" class="arrow"/>

</svg>
